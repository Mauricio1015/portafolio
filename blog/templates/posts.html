<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {%for post in posts%}
    <h1>{{post.title}}</h1>
    <h3>{{post.date}}</h3>
    <p>{{post.description}}</p>
    <img src="{{post.image.url}}" alt="{{post.title}}">

    {%endfor%}
    
</body>
</html>
